name: Get Codex Lost World Release

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild even when Last-Modified is unchanged
        required: false
        default: false
        type: boolean

concurrency:
  group: get-codex-lost-world-release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-update:
    runs-on: macos-latest
    timeout-minutes: 30
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}
      reason: ${{ steps.decision.outputs.reason }}
      last_modified: ${{ steps.remote.outputs.last_modified }}
      npm_version: ${{ steps.npm.outputs.npm_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      safe_version: ${{ steps.meta.outputs.safe_version }}
    env:
      SOURCE_URL: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read cached state from ci-cache branch
        id: cache
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin ci-cache:ci-cache || true

          if git rev-parse --verify ci-cache >/dev/null 2>&1; then
            if git cat-file -e ci-cache:.ci/cache-state.json 2>/dev/null; then
              CACHE_JSON="$(git show ci-cache:.ci/cache-state.json)"
              CACHED_LAST_MODIFIED="$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(String(data.lastModified || ''));" "$CACHE_JSON")"
              CACHED_NPM_VERSION="$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(String(data.npmCodexVersion || ''));" "$CACHE_JSON")"
              echo "cached_last_modified=$CACHED_LAST_MODIFIED" >> "$GITHUB_OUTPUT"
              echo "cached_npm_version=$CACHED_NPM_VERSION" >> "$GITHUB_OUTPUT"
              echo "cache_json<<EOF" >> "$GITHUB_OUTPUT"
              echo "$CACHE_JSON" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            else
              echo "cached_last_modified=" >> "$GITHUB_OUTPUT"
              echo "cached_npm_version=" >> "$GITHUB_OUTPUT"
              echo "cache_json={}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "cached_last_modified=" >> "$GITHUB_OUTPUT"
            echo "cached_npm_version=" >> "$GITHUB_OUTPUT"
            echo "cache_json={}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch remote Last-Modified header
        id: remote
        shell: bash
        run: |
          set -euo pipefail

          headers="$(curl -fsSLI "$SOURCE_URL")"
          last_modified="$(printf '%s\n' "$headers" | tr -d '\r' | grep -i '^last-modified:' | cut -d' ' -f2- | head -n1 || true)"

          if [ -z "$last_modified" ]; then
            echo "Warning: missing Last-Modified header; check-update will treat as changed"
          fi

          echo "last_modified=$last_modified" >> "$GITHUB_OUTPUT"

      - name: Fetch @openai/codex version
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          npm_version="$(npm show @openai/codex version || true)"
          
          if [ -z "$npm_version" ]; then
            echo "Warning: could not fetch @openai/codex version"
          fi
          
          echo "npm_version=$npm_version" >> "$GITHUB_OUTPUT"

      - name: Decide whether build is needed
        id: decision
        shell: bash
        env:
          LAST_MODIFIED: ${{ steps.remote.outputs.last_modified }}
          CACHED_LAST_MODIFIED: ${{ steps.cache.outputs.cached_last_modified }}
          NPM_CODEX_VERSION: ${{ steps.npm.outputs.npm_version }}
          CACHED_NPM_CODEX_VERSION: ${{ steps.cache.outputs.cached_npm_version }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          node scripts/ci/check-update.js

      - name: Download Codex.dmg
        if: ${{ steps.decision.outputs.should_build == 'true' }}
        id: download
        shell: bash
        run: |
          set -euo pipefail
          source_dmg_path="$RUNNER_TEMP/Codex.dmg"
          curl -fL "$SOURCE_URL" -o "$source_dmg_path"
          echo "source_dmg_path=$source_dmg_path" >> "$GITHUB_OUTPUT"

      - name: Read version and prepare metadata
        if: ${{ steps.decision.outputs.should_build == 'true' }}
        id: meta
        shell: bash
        env:
          SOURCE_DMG_PATH: ${{ steps.download.outputs.source_dmg_path }}
        run: |
          set -euo pipefail

          MOUNT_POINT="$RUNNER_TEMP/codex-dmg-mount"
          mkdir -p "$MOUNT_POINT"

          hdiutil attach -readonly -nobrowse -mountpoint "$MOUNT_POINT" "$SOURCE_DMG_PATH" >/dev/null
          trap 'hdiutil detach "$MOUNT_POINT" >/dev/null 2>&1 || true' EXIT

          INFO_PLIST="$MOUNT_POINT/Codex.app/Contents/Info.plist"
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST" 2>/dev/null || true)"

          if [ -z "$version" ]; then
            version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"
          fi

          safe_version="$(printf '%s' "$version" | tr -cs 'A-Za-z0-9._-' '_')"
          release_tag="$safe_version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "safe_version=$safe_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        if: ${{ steps.decision.outputs.should_build == 'true' }}
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          NPM_VERSION: ${{ steps.npm.outputs.npm_version }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          REASON: ${{ steps.decision.outputs.reason }}
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/release-notes.md"
          cat > "$notes_file" <<'EOF'
          ## Get Codex Lost World build

          This release is automatically generated by CI when upstream Codex.dmg changes, @openai/codex updates, or force build is requested.

          Codex App: v__VERSION__
          @openai/codex: v__NPM_VERSION__
          
          - Release tag: `__RELEASE_TAG__`
          - Build reason: `__REASON__`

          ## Signing guidance

          CI uses ad-hoc signing (`codesign --sign -`) only to keep modified binaries runnable for packaging and testing.
          This does **not** replace a proper Developer ID signature and Apple notarization for distribution.

          Example local signing flow with Developer ID:

          ```bash
          codesign --force --deep --sign "Developer ID Application: Your Name (TEAMID)" --options runtime --timestamp /path/to/Codex.app
          xcrun notarytool submit /path/to/CodexIntelMac.dmg --keychain-profile "notary-profile" --wait
          xcrun stapler staple /path/to/CodexIntelMac.dmg
          ```
          EOF

          perl -0777 -i -pe "s/__VERSION__/\$ENV{VERSION}/g; s/__NPM_VERSION__/\$ENV{NPM_VERSION}/g; s/__RELEASE_TAG__/\$ENV{RELEASE_TAG}/g; s/__REASON__/\$ENV{REASON}/g" "$notes_file"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        if: ${{ steps.decision.outputs.should_build == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.release_tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          NPM_VERSION: ${{ steps.npm.outputs.npm_version }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail

          RELEASE_TITLE="CodexMacIntel_v${VERSION}_npm_v${NPM_VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
          fi

      - name: Skip summary when unchanged
        if: ${{ steps.decision.outputs.should_build != 'true' }}
        shell: bash
        run: |
          echo "No update detected; skipping build and release."

  build-mac-intel:
    runs-on: macos-latest
    timeout-minutes: 30
    needs:
      - check-update
    if: ${{ needs.check-update.outputs.should_build == 'true' }}
    env:
      SOURCE_URL: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Intel DMG
        id: macmeta
        shell: bash
        env:
          SAFE_VERSION: ${{ needs.check-update.outputs.safe_version }}
          NPM_VERSION: ${{ needs.check-update.outputs.npm_version }}
        run: |
          set -euo pipefail
          source_dmg_path="$RUNNER_TEMP/Codex.dmg"
          
          # Sanitize npm version for filename just in case
          SAFE_NPM_VERSION="$(printf '%s' "$NPM_VERSION" | tr -cs 'A-Za-z0-9._-' '_')"
          
          artifact_name="CodexMacIntel_v${SAFE_VERSION}_npm_v${SAFE_NPM_VERSION}.dmg"
          artifact_path="$RUNNER_TEMP/$artifact_name"
          curl -fL "$SOURCE_URL" -o "$source_dmg_path"
          node scripts/build-intel-dmg.js --output "$artifact_path" "$source_dmg_path"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Upload mac artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-update.outputs.release_tag }}
          ARTIFACT_PATH: ${{ steps.macmeta.outputs.artifact_path }}
          ARTIFACT_NAME: ${{ steps.macmeta.outputs.artifact_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" "$ARTIFACT_PATH#$ARTIFACT_NAME" --clobber


  update-cache-state:
    runs-on: macos-latest
    timeout-minutes: 15
    needs:
      - check-update
      - build-mac-intel
    if: ${{ needs.check-update.outputs.should_build == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update ci-cache branch state
        shell: bash
        env:
          LAST_MODIFIED: ${{ needs.check-update.outputs.last_modified }}
          NPM_VERSION: ${{ needs.check-update.outputs.npm_version }}
          VERSION: ${{ needs.check-update.outputs.version }}
          RELEASE_TAG: ${{ needs.check-update.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin ci-cache:ci-cache || true

          if git rev-parse --verify ci-cache >/dev/null 2>&1; then
            git checkout ci-cache
          else
            git checkout --orphan ci-cache
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p .ci

          node -e "const fs=require('node:fs'); const state={lastModified:process.env.LAST_MODIFIED||'',npmCodexVersion:process.env.NPM_VERSION||'',version:process.env.VERSION||'',releaseTag:process.env.RELEASE_TAG||'',processedAt:new Date().toISOString()}; fs.writeFileSync('.ci/cache-state.json', JSON.stringify(state, null, 2) + '\n');"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .ci/cache-state.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit"
            exit 0
          fi

          git commit -m "ci: update codex cache state"
          git push origin ci-cache
